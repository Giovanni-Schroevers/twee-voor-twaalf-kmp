#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx3072M

#Gradle
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true

#Backend
# Deployed backend URL, baked into all platforms at build time (see
# shared/build.gradle.kts -> generateBackendConfig). Must end with a slash.
#
# Leave this UNSET for local development: each platform then auto-selects the
# right localhost host (Android emulator -> 10.0.2.2, desktop/iOS -> localhost),
# so the Android/desktop/iOS run configs all work with no flags.
#
# Set it (here, in ~/.gradle/gradle.properties, or via -Pbackend.url=...) only to
# point the app at a real deployed backend, e.g.:
#backend.url=https://api.tweevoortwaalf.nl/